<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080f;
  --surface:#111120;
  --surface2:#181830;
  --border:#ffffff12;
  --accent:#7c3aed;
  --accent2:#a855f7;
  --accent3:#ec4899;
  --text:#e8e8f0;
  --text-muted:#9090b0;
  --gold:#f59e0b;
  --silver:#94a3b8;
  --bronze:#b45309;
  --radius:14px;
  --card-w:254px;
}
html{scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── Background particles ── */
#bg-canvas{position:fixed;inset:0;z-index:0;opacity:.35;pointer-events:none}

/* ── Header ── */
header{
  position:relative;
  z-index:10;
  padding:3rem 2rem 2rem;
  text-align:center;
  background:linear-gradient(180deg,#1a0a3530 0%,transparent 100%);
}
.header-eyebrow{
  font-size:1.01rem;
  letter-spacing:.25em;
  text-transform:uppercase;
  color:var(--accent2);
  margin-bottom:1rem;
  opacity:0;
}
h1{
  font-size:clamp(2rem,5vw,3.5rem);
  font-weight:800;
  letter-spacing:-.03em;
  background:linear-gradient(135deg,#e8e8ff 0%,var(--accent2) 50%,var(--accent3) 100%);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
  line-height:1.1;
  opacity:0;
}
.subtitle{
  margin-top:.75rem;
  color:var(--text-muted);
  font-size:1rem;
  opacity:0;
}
.stats-row{
  display:flex;
  justify-content:center;
  gap:2rem;
  margin-top:1.75rem;
  flex-wrap:wrap;
  opacity:0;
}
.stat{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:.2rem;
}
.stat-num{
  font-size:1.75rem;
  font-weight:700;
  background:linear-gradient(135deg,var(--accent2),var(--accent3));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  background-clip:text;
}
.stat-label{font-size:1.01rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em}

/* ── Search ── */
.search-wrap{
  position:sticky;
  top:0;
  z-index:20;
  padding:1rem 2rem;
  background:rgba(8,8,15,.85);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  opacity:0;
}
.search-inner{
  max-width:720px;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  gap:.75rem;
}
.search-input-wrap{
  position:relative;
}
.search-icon{
  position:absolute;
  left:1rem;
  top:50%;
  transform:translateY(-50%);
  color:var(--text-muted);
  pointer-events:none;
}
#search{
  width:100%;
  padding:.85rem 1rem .85rem 2.75rem;
  background:var(--surface);
  border:1.5px solid var(--border);
  border-radius:50px;
  color:var(--text);
  font-size:1rem;
  outline:none;
  transition:border-color .2s, box-shadow .2s;
}
#search:focus{
  border-color:var(--accent2);
  box-shadow:0 0 0 3px rgba(168,85,247,.15), 0 4px 20px rgba(124,58,237,.2);
}
#search::placeholder{color:var(--text-muted)}
.filters{
  display:flex;
  gap:.5rem;
  flex-wrap:wrap;
  align-items:center;
}
.filter-label{font-size:1.01rem;color:var(--text-muted);margin-right:.25rem}
.chip{
  padding:.35rem .85rem;
  border-radius:50px;
  border:1px solid var(--border);
  background:transparent;
  color:var(--text-muted);
  font-size:.78rem;
  cursor:pointer;
  transition:all .15s;
  white-space:nowrap;
}
.chip:hover{border-color:var(--accent2);color:var(--accent2)}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── Results header ── */
.results-header{
  max-width:1400px;
  margin:1.5rem auto 0;
  padding:0 2rem;
  display:flex;
  justify-content:space-between;
  align-items:center;
  color:var(--text-muted);
  font-size:.85rem;
}
#result-count{color:var(--accent2);font-weight:600}

/* ── Grid ── */
.grid{
  max-width:1400px;
  margin:1rem auto;
  padding:0 2rem 3rem;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(var(--card-w),1fr));
  gap:1rem;
}

/* ── Card ── */
.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  overflow:hidden;
  cursor:pointer;
  transition:transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s, border-color .2s;
  opacity:0;
  transform:translateY(20px);
  text-decoration:none;
  display:flex;
  flex-direction:column;
}
.card:hover{
  transform:translateY(-4px) scale(1.01);
  box-shadow:0 12px 40px rgba(124,58,237,.25),0 4px 12px rgba(0,0,0,.4);
  border-color:rgba(168,85,247,.4);
}
.card-art{
  width:100%;
  aspect-ratio:1;
  background:linear-gradient(135deg,var(--surface2),#1a0a35);
  position:relative;
  overflow:hidden;
  flex-shrink:0;
}
.card-art img{
  width:100%;height:100%;
  object-fit:cover;
  transition:transform .3s;
}
.card:hover .card-art img{transform:scale(1.05)}
.art-placeholder{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  font-size:2.45rem;
  background:linear-gradient(135deg,#1a0a35,#0d1b4a);
}
.place-badge{
  position:absolute;
  top:.6rem;right:.6rem;
  padding:.175rem .525rem;
  border-radius:50px;
  font-size:.7rem;
  font-weight:700;
  backdrop-filter:blur(8px);
}
.place-1st{background:rgba(245,158,11,.9);color:#000}
.place-2nd{background:rgba(148,163,184,.9);color:#000}
.place-3rd{background:rgba(180,83,9,.9);color:#fff}
.place-other{background:rgba(0,0,0,.6);color:var(--text-muted)}
.card-body{padding:.8rem;flex:1;display:flex;flex-direction:column;gap:.32rem}
.card-song{
  font-size:.96rem;
  font-weight:700;
  color:var(--text);
  line-height:1.3;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.card-artist{
  font-size:1.08rem;
  color:var(--accent2);
  font-weight:500;
  display:-webkit-box;
  -webkit-line-clamp:1;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.card-album{
  font-size:1.01rem;
  color:var(--text-muted);
  font-style:italic;
  display:-webkit-box;
  -webkit-line-clamp:1;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.card-meta{
  margin-top:auto;
  padding-top:.44rem;
  border-top:1px solid var(--border);
  display:flex;
  flex-direction:column;
  gap:.3rem;
}
.meta-row{display:flex;align-items:center;gap:.4rem;font-size:1.05rem;color:var(--text-muted)}
.meta-row svg{flex-shrink:0;opacity:.6}
.league-tag{
  display:inline-block;
  padding:.15rem .5rem;
  border-radius:4px;
  background:rgba(124,58,237,.2);
  border:1px solid rgba(124,58,237,.3);
  color:var(--accent2);
  font-size:.96rem;
  font-weight:600;
  letter-spacing:.02em;
}

/* ── Empty state ── */
#empty{
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:5rem 2rem;
  text-align:center;
  gap:1rem;
}
#empty .empty-icon{font-size:4rem;opacity:.5}
#empty h3{font-size:1.3rem;color:var(--text-muted)}
#empty p{color:var(--text-muted);opacity:.7;font-size:.9rem}

/* ── Load more ── */
#load-more-wrap{
  text-align:center;
  padding:1rem 2rem 3rem;
  display:none;
}
#load-more{
  padding:.7rem 2rem;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;
  border:none;
  border-radius:50px;
  font-size:.9rem;
  font-weight:600;
  cursor:pointer;
  transition:opacity .2s, transform .15s;
}
#load-more:hover{opacity:.9;transform:translateY(-1px)}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:3px}

/* ── Responsive ── */
@media(max-width:600px){
  :root{--card-w:140px}
  h1{font-size:1.75rem}
  .stats-row{gap:1.25rem}
  .grid{padding:0 1rem 3rem;gap:.6rem}
}
</style>
</head>

const uniqueLeagues = [...new Set(SONGS.map(s=>s[F.LEAGUE]))].sort((a,b)=>{
  const num = s => s==='Random Thunder' ? 1 : parseInt(s.replace('Random Thunder S',''));

});

// ── Background canvas ──
(function(){
  const c = document.getElementById('bg-canvas');
  const ctx = c.getContext('2d');
  let W, H, t = 0;

  // Color palette: purple, violet, blue, pink, cyan
  const COLORS = [
    [168,85,247],  // purple
    [124,58,237],  // violet
    [99,102,241],  // indigo
    [236,72,153],  // pink
    [34,211,238],  // cyan
    [192,38,211],  // fuchsia
  ];

  // ── Aurora orbs (large, vivid) ──
  const orbs = Array.from({length:8}, (_, i) => ({
    x: Math.random(), y: Math.random(),
    vx: (Math.random()-.5)*0.0004, vy: (Math.random()-.5)*0.0004,
    r: 0.22 + Math.random()*0.28,
    col: COLORS[i % COLORS.length],
    phase: Math.random()*Math.PI*2,
    speed: 0.008 + Math.random()*0.012
  }));

  // ── Particles ──
  const N = 200;
  const pts = Array.from({length:N}, () => ({
    x: Math.random(), y: Math.random(),
    vx: (Math.random()-.5)*0.0012, vy: (Math.random()-.5)*0.0012,
    r: Math.random()*2.5+0.5,
    col: COLORS[Math.floor(Math.random()*COLORS.length)],
    pulse: Math.random()*Math.PI*2,
    pspeed: 0.04 + Math.random()*0.06
  }));

  // ── Shooting stars ──
  const stars = [];
  function spawnStar(){
    const col = COLORS[Math.floor(Math.random()*COLORS.length)];
    stars.push({
      x: Math.random()*W, y: Math.random()*H*0.6,
      vx: (2+Math.random()*4)*(Math.random()<.5?1:-1),
      vy: 1+Math.random()*2,
      len: 60+Math.random()*100,
      alpha: 0.9, col
    });
  }
  let starTimer = 0;

  // ── Shockwaves ──
  const shocks = [];
  function spawnShock(){
    const col = COLORS[Math.floor(Math.random()*COLORS.length)];
    shocks.push({x:Math.random()*W, y:Math.random()*H, r:0, alpha:0.5, col});
  }
  let shockTimer = 0;

  // ── Ripple rings ──
  const rings = [];
  function spawnRing(){
    const col = COLORS[Math.floor(Math.random()*COLORS.length)];
    rings.push({x:Math.random()*W, y:Math.random()*H, r:0,
      maxR:100+Math.random()*180, alpha:0.35,
      speed:1.2+Math.random()*1.5, col});
  }
  let ringTimer = 0;

  function resize(){ W=c.width=innerWidth; H=c.height=innerHeight; }
  resize(); window.addEventListener('resize', resize);

  function rgb(col,a){ return `rgba(${col[0]},${col[1]},${col[2]},${a})`; }

  function draw(){
    t++;
    ctx.clearRect(0,0,W,H);

    // ── Aurora orbs ──
    orbs.forEach(o => {
      o.x = (o.x + o.vx + 1) % 1;
      o.y = (o.y + o.vy + 1) % 1;
      const pulse = 0.8 + 0.2*Math.sin(t*o.speed + o.phase);
      const rad = o.r * Math.min(W,H) * pulse;
      const gx = o.x*W, gy = o.y*H;
      const g = ctx.createRadialGradient(gx,gy,0,gx,gy,rad);
      g.addColorStop(0,   rgb(o.col, 0.18));
      g.addColorStop(0.4, rgb(o.col, 0.10));
      g.addColorStop(0.8, rgb(o.col, 0.04));
      g.addColorStop(1,   rgb(o.col, 0));
      ctx.beginPath(); ctx.arc(gx,gy,rad,0,Math.PI*2);
      ctx.fillStyle=g; ctx.fill();
    });

    // ── Particles with glow ──
    pts.forEach(p => {
      p.x = (p.x + p.vx + 1) % 1;
      p.y = (p.y + p.vy + 1) % 1;
      p.pulse += p.pspeed;
      const pr = p.r * (0.6 + 0.7*Math.abs(Math.sin(p.pulse)));
      const alpha = 0.5 + 0.5*Math.abs(Math.sin(p.pulse*0.8));
      // glow halo
      ctx.beginPath(); ctx.arc(p.x*W, p.y*H, pr*3, 0, Math.PI*2);
      ctx.fillStyle = rgb(p.col, alpha*0.12); ctx.fill();
      // core
      ctx.beginPath(); ctx.arc(p.x*W, p.y*H, pr, 0, Math.PI*2);
      ctx.fillStyle = rgb(p.col, alpha); ctx.fill();
    });

    // ── Connecting lines ──
    for(let i=0;i<N;i++) for(let j=i+1;j<N;j++){
      const dx=(pts[i].x-pts[j].x)*W, dy=(pts[i].y-pts[j].y)*H;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<80){
        ctx.beginPath();
        ctx.moveTo(pts[i].x*W,pts[i].y*H);
        ctx.lineTo(pts[j].x*W,pts[j].y*H);
        ctx.strokeStyle=rgb(pts[i].col, 0.25*(1-d/80));
        ctx.lineWidth=0.8; ctx.stroke();
      }
    }

    // ── Ripple rings ──
    if(++ringTimer>60){ringTimer=0;spawnRing();}
    for(let i=rings.length-1;i>=0;i--){
      const r=rings[i]; r.r+=r.speed; r.alpha*=0.978;
      ctx.beginPath(); ctx.arc(r.x,r.y,r.r,0,Math.PI*2);
      ctx.strokeStyle=rgb(r.col,r.alpha); ctx.lineWidth=1.5; ctx.stroke();
      if(r.r>r.maxR||r.alpha<0.004) rings.splice(i,1);
    }

    // ── Shooting stars ──
    if(++starTimer>120){starTimer=0;spawnStar();}
    for(let i=stars.length-1;i>=0;i--){
      const s=stars[i];
      s.x+=s.vx; s.y+=s.vy; s.alpha*=0.96;
      const g=ctx.createLinearGradient(s.x,s.y,s.x-s.vx*(s.len/Math.hypot(s.vx,s.vy)),s.y-s.vy*(s.len/Math.hypot(s.vx,s.vy)));
      g.addColorStop(0,rgb(s.col,s.alpha));
      g.addColorStop(1,rgb(s.col,0));
      ctx.beginPath(); ctx.moveTo(s.x,s.y);
      ctx.lineTo(s.x-s.vx*(s.len/Math.hypot(s.vx,s.vy)), s.y-s.vy*(s.len/Math.hypot(s.vx,s.vy)));
      ctx.strokeStyle=g; ctx.lineWidth=1.5; ctx.stroke();
      if(s.alpha<0.03||s.x<-200||s.x>W+200||s.y>H+200) stars.splice(i,1);
    }

    // ── Shockwaves ──
    if(++shockTimer>180){shockTimer=0;spawnShock();}
    for(let i=shocks.length-1;i>=0;i--){
      const s=shocks[i]; s.r+=3.5; s.alpha*=0.96;
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.strokeStyle=rgb(s.col,s.alpha); ctx.lineWidth=2; ctx.stroke();
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r*0.7,0,Math.PI*2);
      ctx.strokeStyle=rgb(s.col,s.alpha*0.4); ctx.lineWidth=1; ctx.stroke();
      if(s.r>350||s.alpha<0.004) shocks.splice(i,1);
    }

    requestAnimationFrame(draw);
  }
  draw();
})();

// ── League chips ──
const filtersEl = document.querySelector('.filters');
uniqueLeagues.forEach(lg=>{
  const ch = document.createElement('button');
  ch.className='chip';ch.dataset.filter='league';ch.dataset.value=lg;
  const s = lg === 'Random Thunder' ? 'Season 1' : 'Season ' + lg.replace('Random Thunder S','');
  ch.textContent = s;
  filtersEl.appendChild(ch);
});
filtersEl.addEventListener('click',e=>{
  const ch=e.target.closest('.chip');if(!ch)return;
  filtersEl.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  ch.classList.add('active');
  activeLeague=ch.dataset.value||'';
  doSearch();
});

// ── iTunes art fetch ──
async function fetchArt(artist,song,el){
  const key=artist+'|'+song;
  if(artCache.has(key)){applyArt(el,artCache.get(key));return;}
  const q=encodeURIComponent(artist+' '+song);
  try{
    const r=await fetch(`https://itunes.apple.com/search?term=${q}&media=music&limit=1&entity=song`);
    const j=await r.json();
    const url=j.results?.[0]?.artworkUrl100?.replace('100x100','300x300')||null;
    artCache.set(key,url);
    applyArt(el,url);
  }catch(e){artCache.set(key,null);}
}
function applyArt(el,url){
  if(!url)return;
  const ph=el.querySelector('.art-placeholder');
  if(!ph)return;
  const img=document.createElement('img');
  img.src=url;img.alt='';img.loading='lazy';
  img.onload=()=>{ph.replaceWith(img);};
}

// ── Spotify search URL ──
function spotifyUrl(song,artist){
  return 'https://open.spotify.com/search/'+encodeURIComponent(song+' '+artist);
}

// ── Place badge ──
function placeBadge(place){
  if(!place)return '';
  const cls=place==='1st'?'place-1st':place==='2nd'?'place-2nd':place==='3rd'?'place-3rd':'place-other';
  const icon=place==='1st'?'🥇':place==='2nd'?'🥈':place==='3rd'?'🥉':'';
  return `<div class="place-badge ${cls}">${icon} ${place}</div>`;
}

// ── Music note emoji for placeholder ──
const NOTES=['🎵','🎶','🎸','🎹','🎺','🎻','🥁','🎷'];
function noteFor(s){return NOTES[(s[F.SONG]||'').charCodeAt(0)%NOTES.length]||'🎵'}

// ── Render batch ──
const grid = document.getElementById('grid');
const empty = document.getElementById('empty');
const lmWrap = document.getElementById('load-more-wrap');
const lmBtn = document.getElementById('load-more');

function renderBatch(songs, startIdx, count){
  const frag = document.createDocumentFragment();
  const cards = [];
  for(let i=startIdx;i<Math.min(startIdx+count,songs.length);i++){
    const s=songs[i];
    const a=document.createElement('a');
    a.className='card';
    a.href=spotifyUrl(s[F.SONG],s[F.ARTIST]);
    a.target='_blank';a.rel='noopener noreferrer';
    const leagueShort=s[F.LEAGUE].replace('Random Thunder','RT');
    a.innerHTML=`
      <div class="card-art">
        <div class="art-placeholder">${noteFor(s)}</div>
        ${placeBadge(s[F.PLACE])}
      </div>
      <div class="card-body">
        <div class="card-song">${escHtml(s[F.SONG])}</div>
        <div class="card-artist">${escHtml(s[F.ARTIST])}</div>
        ${s[F.ALBUM]&&s[F.ALBUM]!==s[F.SONG]?`<div class="card-album">${escHtml(s[F.ALBUM])}</div>`:''}
        <div class="card-meta">
          <div class="meta-row">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
            <span class="league-tag">${escHtml(leagueShort)}</span>
            <span style="color:var(--text-muted)">${escHtml(s[F.ROUND])}</span>
          </div>
          <div class="meta-row">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <span>${escHtml(s[F.SUBMITTER]||'Unknown')}</span>
          </div>
        </div>
      </div>`;
    frag.appendChild(a);
    cards.push(a);
    // Lazy fetch art
    fetchArt(s[F.ARTIST],s[F.SONG],a);
  }
  grid.appendChild(frag);
  // Animate new cards in
  if(cards.length){
    anime({
      targets:cards,
      opacity:[0,1],
      translateY:[20,0],
      delay:anime.stagger(30,{start:0}),
      duration:400,
      easing:'easeOutQuart'
    });
  }
  return startIdx+cards.length;
}

function escHtml(s){
  if(!s)return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Search ──
let debounceTimer;
document.getElementById('search').addEventListener('input',e=>{
  clearTimeout(debounceTimer);
  debounceTimer=setTimeout(()=>{query=e.target.value.trim();doSearch();},120);
});

function doSearch(){
  const q=query.toLowerCase();
  filtered = q || activeLeague
    ? sorted.filter(s=>{
        if(activeLeague && s[F.LEAGUE]!==activeLeague) return false;
        if(!q) return true;
        return (s[F.SONG]||'').toLowerCase().includes(q)
          ||(s[F.ARTIST]||'').toLowerCase().includes(q)
          ||(s[F.ALBUM]||'').toLowerCase().includes(q)
          ||(s[F.SUBMITTER]||'').toLowerCase().includes(q)
          ||(s[F.ROUND]||'').toLowerCase().includes(q);
      })
    : sorted;
  document.getElementById('result-count').textContent=filtered.length.toLocaleString();
  grid.innerHTML='';
  rendered=0;
  if(filtered.length===0){
    empty.style.display='flex';lmWrap.style.display='none';
  } else {
    empty.style.display='none';
    rendered=renderBatch(filtered,0,PAGE);
    lmWrap.style.display=rendered<filtered.length?'block':'none';
  }
}

lmBtn.addEventListener('click',()=>{
  rendered=renderBatch(filtered,rendered,PAGE);
  lmWrap.style.display=rendered<filtered.length?'block':'none';
});

// ── Page load animations ──
window.addEventListener('DOMContentLoaded',()=>{
  // Animate header elements
  anime.timeline({easing:'easeOutExpo'})
    .add({targets:'.header-eyebrow',opacity:[0,1],translateY:[-10,0],duration:600})
    .add({targets:'h1',opacity:[0,1],translateY:[30,0],duration:700},'-=300')
    .add({targets:'.subtitle',opacity:[0,1],translateY:[15,0],duration:500},'-=400')
    .add({targets:'.stats-row',opacity:[0,1],translateY:[15,0],duration:500},'-=300')
    .add({targets:'.search-wrap',opacity:[0,1],duration:400},'-=200');

  // Count-up animations
  const countUp=(el,target,duration)=>{
    let start=0;
    const step=timestamp=>{
      if(!start)start=timestamp;
      const progress=Math.min((timestamp-start)/duration,1);
      const ease=1-Math.pow(1-progress,3);
      el.textContent=Math.floor(ease*target).toLocaleString();
      if(progress<1)requestAnimationFrame(step);
      else el.textContent=target.toLocaleString();
    };
    requestAnimationFrame(step);
  };
  setTimeout(()=>{
    countUp(document.getElementById('stat-songs'),4595,1200);
    countUp(document.getElementById('stat-rounds'),253,1000);
    countUp(document.getElementById('stat-seasons'),14,800);
    countUp(document.getElementById('stat-players'),43,900);
  },400);

  // Initial render
  rendered=renderBatch(sorted,0,PAGE);
  document.getElementById('result-count').textContent=sorted.length.toLocaleString();
  lmWrap.style.display=rendered<sorted.length?'block':'none';
});
</script>
